- name: Download all files (with transfer.it support)
  id: download_files
  run: |
    mkdir -p files
    total=${{ steps.parse.outputs.url_count }}
    counter=1
    success=0

    # نصب megatools در صورت نیاز
    if ! command -v megatools &> /dev/null; then
      sudo apt-get update -qq && sudo apt-get install -y megatools 2>/dev/null || true
    fi

    while IFS= read -r url; do
      [ -z "$url" ] && continue
      echo "========================================="
      echo "[$counter/$total] Processing: $url"

      # تعیین نام فایل
      FILENAME_FROM_URL=$(echo "$url" | sed 's/?.*//' | xargs basename)
      [ -z "$FILENAME_FROM_URL" ] && FILENAME_FROM_URL="unknown_${counter}"

      # پشتیبانی از transfer.it / MEGA
      if [[ "$url" == *"transfer.it/t/"* ]]; then
        echo "🔗 Detected transfer.it link, attempting MEGA download..."
        FILE_CODE=$(echo "$url" | grep -oP 'transfer\.it/t/\K[^/?]+')
        DL_NAME="sci-hub.ir_transfer_${FILE_CODE}"
        
        # تلاش برای دانلود با megatools
        if command -v megadl &> /dev/null; then
          if megadl "$url" --path files/ 2>/dev/null; then
            DOWNLOADED_FILE=$(ls -t files/ | head -1)
            mv "files/$DOWNLOADED_FILE" "files/${DL_NAME}.${DOWNLOADED_FILE##*.}" 2>/dev/null || true
            success=$((success + 1))
            echo "✅ Downloaded via MEGA: $DOWNLOADED_FILE"
            counter=$((counter + 1))
            continue
          fi
        fi
        echo "⚠️ megadl failed, falling back to curl (may download HTML)..."
      fi

      # دانلود معمولی با curl
      FINAL_FILENAME="${FILENAME_FROM_URL}"
      if curl -L --fail --retry 5 --retry-delay 10 --connect-timeout 30 -o "files/${FINAL_FILENAME}" "$url"; then
        size=$(ls -lh "files/${FINAL_FILENAME}" | awk '{print $5}')
        echo "✅ Downloaded: ${FINAL_FILENAME} ($size)"
        success=$((success + 1))
      else
        echo "❌ Failed: $url"
      fi
      counter=$((counter + 1))
    done < urls.txt

    echo "success_count=${success}" >> $GITHUB_OUTPUT
    echo "Downloaded: $success / $total"
